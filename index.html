<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f5f5f0; --card: #ffffff; --border: rgba(0,0,0,0.08); --text: #1a1a1a; --muted: #666;
    --accent: #1a56db; --accent-light: #e8f0fe; --green: #0d7a4a; --green-light: #e6f4ed;
    --amber: #92400e; --amber-light: #fef3c7; --red: #991b1b; --red-light: #fee2e2;
    --current: #1a56db; --current-light: #dbeafe;
  }
  @media (prefers-color-scheme: dark) {
    :root { --bg:#111;--card:#1c1c1e;--border:rgba(255,255,255,0.08);--text:#f0f0f0;--muted:#999;
      --accent:#4d8ef7;--accent-light:#1a2740;--green:#34d399;--green-light:#0d2a1f;
      --amber:#fbbf24;--amber-light:#2d1f0a;--red:#f87171;--red-light:#2d0f0f;
      --current:#60a5fa;--current-light:#1e3a5f; }
  }
  body { background: var(--bg); color: var(--text); font-family: -apple-system,'Helvetica Neue',Arial,sans-serif; padding: 16px; }
  h1 { font-size: 18px; font-weight: 600; margin-bottom: 2px; }
  .subtitle { font-size: 13px; color: var(--muted); margin-bottom: 20px; }
  .card { background: var(--card); border-radius: 14px; border: 1px solid var(--border); padding: 16px; margin-bottom: 14px; }
  .inputs-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .input-group label { display: block; font-size: 11px; color: var(--muted); margin-bottom: 5px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.4px; }
  .input-row { display: flex; align-items: center; gap: 6px; background: var(--bg); border: 1px solid var(--border); border-radius: 9px; padding: 8px 12px; }
  .input-row:focus-within { border-color: var(--accent); }
  .unit { font-size: 12px; color: var(--muted); white-space: nowrap; }
  .input-row input[type="number"] { flex: 1; background: none; border: none; outline: none; font-size: 16px; font-weight: 600; color: var(--text); min-width: 0; width: 100%; }
  input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }
  .range-section { margin-top: 16px; }
  .range-label { font-size: 11px; color: var(--muted); font-weight: 500; text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 8px; }
  .range-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .range-field label { display: block; font-size: 11px; color: var(--muted); margin-bottom: 4px; }
  .step-row { display: flex; align-items: center; gap: 6px; margin-top: 10px; flex-wrap: wrap; }
  .step-row label { font-size: 11px; color: var(--muted); font-weight: 500; }
  .step-btn { background: var(--bg); border: 1px solid var(--border); border-radius: 20px; padding: 4px 12px; font-size: 12px; cursor: pointer; color: var(--text); transition: all 0.15s; }
  .step-btn:hover { border-color: var(--accent); color: var(--accent); }
  .step-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .slider-section { margin-top: 14px; }
  .slider-label-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .slabel { font-size: 11px; color: var(--muted); font-weight: 500; }
  .sval { font-size: 15px; font-weight: 700; color: var(--accent); }
  input[type="range"] { width: 100%; accent-color: var(--accent); cursor: pointer; }
  .metrics { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 14px; }
  .metric { background: var(--card); border-radius: 11px; border: 1px solid var(--border); padding: 12px; }
  .mlabel { font-size: 11px; color: var(--muted); margin-bottom: 3px; font-weight: 500; }
  .mval { font-size: 17px; font-weight: 700; }
  .mval.green { color: var(--green); } .mval.blue { color: var(--accent); } .mval.amber { color: var(--amber); }
  .chart-wrap { position: relative; height: 200px; }
  .table-section { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { font-size: 10px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; padding: 7px 10px; text-align: right; border-bottom: 1px solid var(--border); }
  th:first-child { text-align: left; }
  td { padding: 9px 10px; text-align: right; border-bottom: 1px solid var(--border); }
  td:first-child { text-align: left; font-weight: 500; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--bg); }
  tr.current-row td { background: var(--current-light); }
  tr.current-row td:first-child { color: var(--current); font-weight: 700; }
  .badge { display: inline-block; font-size: 9px; padding: 2px 6px; border-radius: 20px; margin-left: 5px; font-weight: 600; vertical-align: middle; }
  .badge-blue { background: var(--current-light); color: var(--current); }
  .badge-green { background: var(--green-light); color: var(--green); }
  .badge-red { background: var(--red-light); color: var(--red); }
  .diff-pos { color: var(--green); font-size: 11px; } .diff-neg { color: var(--red); font-size: 11px; }
</style>
</head>
<body>
<h1>日元工资换算器</h1>
<p class="subtitle">实时计算不同汇率下的人民币到手金额</p>

<div class="card">
  <div class="inputs-grid">
    <div class="input-group">
      <label>到手工资（日元）</label>
      <div class="input-row"><span class="unit">¥</span><input type="number" id="jpy" value="220000" min="0" step="1000"><span class="unit">JPY</span></div>
    </div>
    <div class="input-group">
      <label>当前汇率</label>
      <div class="input-row"><input type="number" id="currentRate" value="4.30" min="0.01" step="0.01"><span class="unit">CNY/100JPY</span></div>
    </div>
  </div>
  <div class="range-section">
    <div class="range-label">汇率区间</div>
    <div class="range-inputs">
      <div class="range-field"><label>最小汇率</label><div class="input-row"><input type="number" id="minRate" value="3.50" step="0.10"></div></div>
      <div class="range-field"><label>最大汇率</label><div class="input-row"><input type="number" id="maxRate" value="5.00" step="0.10"></div></div>
    </div>
    <div class="step-row">
      <label>刻度：</label>
      <button class="step-btn" data-step="0.05">0.05</button>
      <button class="step-btn active" data-step="0.10">0.10</button>
      <button class="step-btn" data-step="0.20">0.20</button>
      <button class="step-btn" data-step="0.25">0.25</button>
      <button class="step-btn" data-step="0.50">0.50</button>
    </div>
  </div>
  <div class="slider-section">
    <div class="slider-label-row"><span class="slabel">拖动预览汇率</span><span class="sval" id="sliderVal">4.30</span></div>
    <input type="range" id="rateSlider" min="0" max="100" value="50">
  </div>
</div>

<div class="metrics" id="metrics"></div>

<div class="card"><div class="chart-wrap"><canvas id="chart" role="img" aria-label="不同汇率下人民币金额"></canvas></div></div>

<div class="card table-section">
  <table><thead><tr><th>汇率</th><th>人民币（元）</th><th>与当前差</th><th>年收入</th></tr></thead><tbody id="tbody"></tbody></table>
</div>

<script>
let step = 0.10, chart = null;
function getInputs() {
  const jpy = parseFloat(document.getElementById('jpy').value)||220000;
  const cur = parseFloat(document.getElementById('currentRate').value)||4.30;
  const mn = parseFloat(document.getElementById('minRate').value)||3.50;
  const mx = parseFloat(document.getElementById('maxRate').value)||5.00;
  return {jpy,cur,mn:Math.min(mn,mx),mx:Math.max(mn,mx)};
}
function buildRates(mn,mx){
  const rates=[],s=Math.round(step*100);
  let r=Math.round(mn*100),end=Math.round(mx*100);
  while(r<=end){rates.push(r/100);r+=s;}
  return rates;
}
function fmt(n){return n.toLocaleString('zh-CN',{maximumFractionDigits:2,minimumFractionDigits:2});}
function render(){
  const {jpy,cur,mn,mx}=getInputs();
  const rates=buildRates(mn,mx);
  const curCny=jpy*cur/100,maxCny=jpy*mx/100,minCny=jpy*mn/100;
  document.getElementById('metrics').innerHTML=`
    <div class="metric"><div class="mlabel">当前汇率到手</div><div class="mval blue">￥${Math.round(curCny).toLocaleString()}</div></div>
    <div class="metric"><div class="mlabel">最高 (${mx.toFixed(2)})</div><div class="mval green">￥${Math.round(maxCny).toLocaleString()}</div></div>
    <div class="metric"><div class="mlabel">最低 (${mn.toFixed(2)})</div><div class="mval amber">￥${Math.round(minCny).toLocaleString()}</div></div>`;
  const labels=rates.map(r=>r.toFixed(2));
  const values=rates.map(r=>parseFloat((jpy*r/100).toFixed(2)));
  const colors=rates.map(r=>Math.abs(r-cur)<step/2?'#1a56db':r>cur?'#0d7a4a':'#d97706');
  if(chart)chart.destroy();
  chart=new Chart(document.getElementById('chart').getContext('2d'),{
    type:'bar',
    data:{labels,datasets:[{data:values,backgroundColor:colors,borderRadius:4,borderSkipped:false}]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{title:i=>`汇率 ${i[0].label}`,label:i=>`￥${fmt(i.raw)}`}}},
      scales:{x:{grid:{display:false},ticks:{font:{size:10},maxRotation:45,autoSkip:rates.length>15}},
        y:{grid:{color:'rgba(128,128,128,0.1)'},ticks:{font:{size:10},callback:v=>'￥'+(v/10000).toFixed(1)+'万'}}}}
  });
  const tbody=document.getElementById('tbody');
  tbody.innerHTML='';
  rates.forEach(r=>{
    const cny=jpy*r/100,diff=cny-curCny,isCur=Math.abs(r-cur)<step/2;
    const diffHtml=isCur?'<span style="color:var(--muted)">—</span>':
      diff>0?`<span class="diff-pos">+${fmt(diff)}</span>`:`<span class="diff-neg">${fmt(diff)}</span>`;
    const yearly=(cny*12/10000).toFixed(1)+'万';
    const badge=isCur?'<span class="badge badge-blue">当前</span>':r===mx?'<span class="badge badge-green">最高</span>':r===mn?'<span class="badge badge-red">最低</span>':'';
    const tr=document.createElement('tr');
    if(isCur)tr.className='current-row';
    tr.innerHTML=`<td>${r.toFixed(2)}${badge}</td><td>￥${fmt(cny)}</td><td>${diffHtml}</td><td>${yearly}</td>`;
    tbody.appendChild(tr);
  });
  const pct=mx===mn?50:((cur-mn)/(mx-mn))*100;
  document.getElementById('rateSlider').value=Math.max(0,Math.min(100,pct));
  document.getElementById('sliderVal').textContent=cur.toFixed(2);
}
document.querySelectorAll('.step-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.step-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');step=parseFloat(btn.dataset.step);render();
  });
});
document.getElementById('rateSlider').addEventListener('input',function(){
  const {mn,mx}=getInputs();
  const r=mn+(mx-mn)*(this.value/100);
  document.getElementById('currentRate').value=r.toFixed(2);
  document.getElementById('sliderVal').textContent=r.toFixed(2);
  render();
});
['jpy','currentRate','minRate','maxRate'].forEach(id=>document.getElementById(id).addEventListener('input',render));
render();
</script>
</body>
</html>
